name: Weekly Security Audit

on:
  schedule:
    - cron: '0 9 * * 1' # Monday 9am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        id: audit
        run: cargo audit --deny-warnings
        continue-on-error: true
      - name: Install cargo-deny
        if: steps.audit.outcome == 'success'
        run: cargo install cargo-deny --locked
      - name: Run cargo deny advisories
        if: steps.audit.outcome == 'success'
        id: deny
        run: cargo deny check advisories
        continue-on-error: true
      - name: Create issue on failure
        if: steps.audit.outcome == 'failure' || steps.deny.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Security advisory found — ${new Date().toISOString().slice(0, 10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security-advisory',
              per_page: 1,
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: 'The weekly security audit found new advisories. Run `cargo audit` and `cargo deny check advisories` locally for details.',
                labels: ['security-advisory'],
              });
            }
