[runtime]
default_model = "claude-sonnet-4-6"
default_provider = "anthropic"
system_prompt = "You are Freebird, a helpful AI assistant."
max_output_tokens = 8192
max_tool_rounds = 10
temperature = 0.7
max_turns_per_session = 50
drain_timeout_secs = 30

[[providers]]
id = "anthropic"
kind = "anthropic"

[[channels]]
id = "cli"
kind = "cli"
prompt = "you> "

[tools]
sandbox_root = "~/.freebird/sandbox"
default_timeout_secs = 30
# Additional directories the agent may access (absolute paths).
# Can also be passed via CLI: freebird serve --allow-dir ~/projects
# allowed_directories = ["~/Documents/myproject", "~/src/other"]
allowed_shell_commands = [
    # Read-only
    "ls", "cat", "grep", "head", "tail", "wc",
    # Build & verify
    "cargo", "rustfmt",
    # Version control
    "git",
    # File discovery & management
    "find", "diff", "mkdir", "rm", "cp", "mv", "touch",
    # Text processing
    "sort", "uniq", "sed", "awk", "tr", "cut",
]
max_shell_output_bytes = 1048576

[tools.edit]
diff_preview = true
diff_context_lines = 3

[memory]
db_path = "~/.freebird/freebird.db"
keyfile_path = "~/.freebird/db.key"
# pbkdf2_iterations = 100000
verify_on_load = true

[knowledge]
auto_retrieve = true
max_context_entries = 5
relevance_threshold = -0.5
max_context_tokens = 2000

[security]
max_tool_calls_per_turn = 25
require_consent_above = "high"
consent_timeout_secs = 60
max_pending_consent_requests = 5

[security.egress]
allowed_hosts = [
    # Provider APIs (required)
    "api.anthropic.com",
    "api.openai.com",
    # Structured data APIs (safe — pure JSON, no user-generated text)
    "api.open-meteo.com",
    "api.github.com",
    "api.exchangerate-api.com",
    "timeapi.io",
    # Semi-structured (user-generated text fields — output scanning applies)
    "en.wikipedia.org",
    "api.stackexchange.com",
]
allowed_ports = [443]
max_response_bytes = 102400
request_timeout_secs = 30

[security.budgets]
max_tokens_per_session = 500000
max_tokens_per_request = 32768
max_tool_rounds_per_turn = 10

[security.secret_guard]
enabled = true
action = "consent"
redact_output = true
# extra_sensitive_file_patterns = []
# extra_sensitive_command_patterns = []

[security.injection]
input_response = "prompt"           # "block" | "prompt" | "allow"
tool_output_response = "prompt"     # "block" | "prompt" | "allow"
# model_output and context are always "block" (not configurable)
prompt_timeout_secs = 60

[daemon]
host = "127.0.0.1"
port = 7531

[logging]
level = "info"
format = "pretty"
