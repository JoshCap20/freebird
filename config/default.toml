[runtime]
default_model = "claude-sonnet-4-6"
default_provider = "anthropic"
system_prompt = "You are FreeBird, a helpful AI assistant."
max_output_tokens = 8192
max_tool_rounds = 10
temperature = 0.7
max_turns_per_session = 50
drain_timeout_secs = 30

[[providers]]
id = "anthropic"
kind = "anthropic"

[[channels]]
id = "cli"
kind = "cli"
prompt = "you> "

[tools]
sandbox_root = "~/.freebird/sandbox"
default_timeout_secs = 30
# Additional directories the agent may access (absolute paths).
# Can also be passed via CLI: freebird serve --allow-dir ~/projects
# allowed_directories = ["~/Documents/myproject", "~/src/other"]
allowed_shell_commands = ["ls", "cat", "grep", "head", "tail", "wc"]
max_shell_output_bytes = 1048576

[memory]
kind = "file"
base_dir = "~/.freebird/conversations"

[security]
max_tool_calls_per_turn = 25
require_consent_above = "high"
consent_timeout_secs = 60
max_pending_consent_requests = 5

[daemon]
host = "127.0.0.1"
port = 7531

[logging]
level = "info"
format = "pretty"
