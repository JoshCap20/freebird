# Supply chain security policy — CLAUDE.md §16 (OWASP ASI04)
# Verified with cargo-deny 0.19.x

[advisories]
ignore = []

[licenses]
# Only licenses actually present in the dep tree.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    # CLAUDE.md §1: "No openssl-sys anywhere in the dep tree"
    { crate = "openssl" },
    { crate = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
